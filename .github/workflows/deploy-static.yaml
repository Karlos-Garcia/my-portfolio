name: Deploy Static Site to S3 + CloudFront

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build the site
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      
      #the option after sync is the folder for the build, in next js, out is build folder
      - name: Sync files to S3
        run: |
          aws s3 sync ./out s3://${{ vars.S3_BUCKET_NAME }} --delete

      #self note: invalidate cache is used to invalidate stored cache in cloudfront edge locations
      #therefore, when this command is run, when a new visitor from a specific region loads the files
      #cloudfront immediately fetches the new s3 files to update the display
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Verify deployment
        run: aws sts get-caller-identity